<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>StaticColour</title>
    <link
      rel="icon"
      href="./assets/tin-trinh-staticcolour--favicon--word-mark-icon.png"
      type="image/png"
    />
    <meta name="twitter:card" content="summary" />
    <meta
      name="description"
      content="Art of StaticColour. Digital illustrations and paintings."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css"
    />
    <script
      src="https://kit.fontawesome.com/d300c2ea15.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-8Z33B548MB"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-8Z33B548MB");
    </script>
  </head>

  <body>
    <section class="parallax">
      <div id="color-overlay"></div>
      <header class="hero-header">
        <ul class="branding-navigation">
          <li><div class="triangle"></div></li>
          <li class="icon">
            <a href="index.html"
              ><img src="./assets/staticcolour--typography-logo-icon.png"
            /></a>
          </li>
          <li class="logo">
            <a href="index.html"
              ><img src="./assets/staticcolour--typography-logo-wordmark.png"
            /></a>
          </li>
          <div class="header-links">
            <li class="menu-item"><a href="/portfolio.html">Portfolio</a></li>
            <li class="menu-item"><a href="/projects.html">Posts</a></li>
          </div>
        </ul>
      </header>

      <footer class="hero-footer">
        <ul class="footer-navigation">
          <div class="social-media-menu">
            <div class="grow">
              <a href="https://www.instagram.com/staticcolour/"
                ><i class="social-media-icon ds fab fa-instagram fa-2x"></i
              ></a>
            </div>
            <div class="grow">
              <a href="https://twitter.com/staticcolour"
                ><i class="social-media-icon ds fab fa-twitter fa-2x"></i
              ></a>
            </div>
            <div class="grow">
              <a href="mailto:staticcolour@gmail.com"
                ><i class="social-media-icon ds fas fa-envelope fa-2x"></i
              ></a>
            </div>
          </div>
        </ul>
      </footer>
    </section>

    <main class="work-wrapper">
      <section class="portfolio">
        <ul id="artworkBox" class="grid masonry"></ul>

        <!-- The Modal/Lightbox -->

        <div id="myModal" class="modal" tabindex="0">
          <span class="close cursor" onclick="closeModal()">&times;</span>
          <div class="modal-content" id="modalBox"></div>
          <!-- Next/previous controls -->
          <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
          <a class="next" onclick="plusSlides(1)">&#10095;</a>
          <!-- Caption text -->
          <div class="caption-container">
            <p id="caption"></p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="main-footer">
        <div class="footer-socials footer-box">
          <a href="https://www.instagram.com/staticcolour/"
            ><i class="social-media-icon fab fa-instagram fa-lg grow"></i
          ></a>
          <a href="https://twitter.com/staticcolour"
            ><i class="social-media-icon fab fa-twitter fa-lg grow"></i
          ></a>
          <a href="mailto:staticcolour@gmail.com"
            ><i class="social-media-icon fas fa-envelope fa-lg grow"></i
          ></a>
        </div>

        <div class="footer-box">
          <p>
            <a class="scroll-text footer-text" href="#top">Back to top</a>
          </p>
        </div>
        <div class="footer-box"><p>&copy; 2021 StaticColour</p></div>
      </div>
    </footer>
    <script src="./scripts/artwork.js"></script>
    <script src="./scripts/home.js"></script>
  </body>
</html>
